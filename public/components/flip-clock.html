<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Flip Clock</title>
  <link rel="stylesheet" href="style-fc.css">
</head>
<body>
  <div class="flip-clock">
    <div class="clock-unit">
      <span class="flip" id="hours">
        <span class="top"></span>
        <span class="bottom"></span>
        <span class="line"></span>
      </span>
      <span class="digit">00</span>
      <span class="label">Hours</span>
    </div>
    <div class="clock-unit">
      <span class="flip" id="minutes">
        <span class="top"></span>
        <span class="bottom"></span>
        <span class="line"></span>
      </span>
      <span class="digit">00</span>
      <span class="label">Minutes</span>
    </div>
    <div class="clock-unit">
      <span class="flip" id="seconds">
        <span class="top"></span>
        <span class="bottom"></span>
        <span class="line"></span>
      </span>
      <span class="digit">00</span>
      <span class="label">Seconds</span>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
