<!-- browser-share para cuando se decida emerguer la ventana -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ysabeau+Infant:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="css/dev.css" />
    <link rel="stylesheet" href="css/header-style.css" />
  </head>
  <body>
    <div class="pop-up">
      <div class="header">
        <i class="ti ti-dots"></i>
        <i class="ti ti-x"></i>
      </div>
      <div class="content-pop-up">
        <div class="container">
          <div class="section">
            <div>
              <h2>Buenos días Jorge,</h2>
              <h3>hoy es viernes 28 de Marzo.</h3>
            </div>
            <div>
              <h1>Tus cosas de hoy,</h1>
              <div class="card">
                <div>
                  <i class="ti ti-school"></i>
                </div>
                <div class="timetable vertical">
                  <div>
                    <h2>Filo</h2>
                    <p class="hora">8:15-9:20</p>
                  </div>
                  <div>
                    <h2>Lengua</h2>
                    <p class="hora">9:20-10:25</p>
                  </div>
                  <div>
                    <h2>Libre</h2>
                    <p class="hora">10:25-11:30</p>
                  </div>
                  <div>
                    <h2>Recreo</h2>
                    <p class="hora">11:30-11:45</p>
                  </div>
                  <div>
                    <h2>Mates</h2>
                    <p class="hora">11:45-13:35</p>
                  </div>
                  <div>
                    <h2>Historia</h2>
                    <p class="hora">13:35-14:30</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="final">
              <i class="ti ti-arrow-up-from-arc"></i>
            </div>
          </div>
          <div class="section">
            <h2>Tableros</h2>
            <h1>Instituto</h1>
            <div class="final">
              <i class="ti ti-arrow-up-from-arc"></i>
            </div>
          </div>
          <div class="section">
            <h1>Iocyp</h1>
            <i class="ti ti-paperclip"></i>
            <div class="final">
              <i class="ti ti-arrow-up-from-arc"></i>
            </div>
          </div>
          <div class="section">
            <h2>Y eso es todo por hoy</h2>
            <h1>"Tu puedes"</h1>
          </div>
        </div>
        <div class="scroll-indicator">
          <div class="dot" data-indicator="0"></div>
          <div class="dot" data-indicator="1"></div>
          <div class="dot" data-indicator="2"></div>
          <div class="dot" data-indicator="3"></div>
        </div>
      </div>
    </div>
    <script type="module" src="js/dev.js"></script>
  </body>
</html>
