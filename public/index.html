<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoNest</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/header-style.css" />
    <link rel="stylesheet" href="css/gtoday.css" />
    <link rel="stylesheet" href="css/task.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ysabeau+Infant:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>
  <body>
    <div class="app">
      <div class="nav">
        <div class="workspace-name">
          <div class="dropdown">
            <div class="dropdown-btn">
              Tableros <i class="ti ti-arrows-exchange xl"></i>
            </div>
            <div class="dropdown-opt">
              <hr />
              <div class="hom">
                <i class="ti ti-home l"></i> Home
                <!--Aquí ira el día a día con toda la programación de ese día. Además del carrousel-->
              </div>
              <div class="ins"><i class="ti ti-school l"></i> Instituto</div>
              <div class="ioc"><i class="ti ti-badges l"></i> Iocyp</div>
            </div>
          </div>
        </div>
        <hr />
        <div class="botonera">
          <button
            type="button"
            class="rounded"
            aria-label="Seguimiento de tareas diarias"
            id="folltasks"
          >
            <i class="ti ti-checkbox xl"></i>
            Seg. de tareas
          </button>
          <button
            type="button"
            class="rounded"
            aria-label="Gestión del tiempo"
            id="timgest"
          >
            <i class="ti ti-hourglass xl"></i>
            Ges. del tiempo
          </button>
          <button type="button" class="rounded" aria-label="Diario" id="diary">
            <i class="ti ti-bubble xl"></i>
            Diario
          </button>
          <button
            type="button"
            class="rounded"
            aria-label="Marcador de importancias"
            id="importchec"
          >
            <i class="ti ti-flag-3 xl"></i>
            Importancia
          </button>
          <button
            type="button"
            class="rounded"
            aria-label="Ideas varias"
            id="thinkpan"
          >
            <i class="ti ti-bulb xl"></i>
            Ideas
          </button>
        </div>
        <hr />
        <div class="fin">
          <button type="button" class="rounded" aria-label="Usuario">
            <i class="ti ti-user xl"></i>
          </button>
          <button
            type="button"
            class="rounded btn-i"
            aria-label="Actualizar organización del tablero"
          >
            <i class="ti ti-refresh xl"></i>
          </button>
        </div>
        <hr />
        <button
          type="button"
          class="rounded btn-i"
          aria-label="Abrir/Cerrar navegador"
        >
          <i class="ti ti-chevron-left-pipe xl"></i>
        </button>
        <!--Falta icono de contraer y anteriormente el de configuración (puede que el de usuario también)-->
      </div>

      <!--Contanier-->
      <div class="container">
        <div class="content">
          <div class="content-name">
            <div class="otoday">
              <p class="time"></p>
              <p class="pwish">Buenos días, Jorge</p>
              <div class="gtoday">
                <div class="gday">
                  <p class="num"></p>
                  <p class="day"></p>
                </div>
              </div>
              <p class="pwish">Tareas completas</p>
              <div class="gchart">
                <div class="chart"></div>
              </div>
            </div>
            <div class="today-task">
              <h2>Tus cosas de hoy:</h2>
              <hr />
              <div class="gcolumna">
                <div class="task">
                  <button
                    type="button"
                    class="desplegar"
                    aria-label="desplegar"
                  >
                    <i class="ti ti-chevron-right"></i>
                  </button>
                  <div>
                    <input type="checkbox" aria-label="Marcador" />
                    <p class="title">Nombre de la tarea 1</p>
                  </div>
                  <div class="time-group">
                    <div class="time-left">
                      <i class="ti ti-clock"></i>
                      <p>+1d</p>
                    </div>
                    <div class="progress-container"></div>
                  </div>
                  <button type="button" class="desplegar" aria-label="más">
                    <i class="ti ti-dots"></i>
                  </button>
                </div>
              </div>
            </div>
            <hr />
            <div class="nextyear">
              <div class="">
                <h2>Camino hacia el</h2>
                <h2 class="año">2025</h2>
                <h2>:</h2>
              </div>
              <!--Check list? con cada mes? unidas por un hr?-->
              <hr />
              <div class="gmes"></div>
            </div>
            <hr />
            <!-- <div class="carousel"></div> -->
            <!-- Cambiar al tocar<p>Hoy - Sab - 16/11/24</p> -->
          </div>
        </div>
        <!-- <hr />
      <div class="bottom-left">
          <div class="task">
            <p class="right-content">0</p>
            <p>Tareas cumplidas</p>
          </div>
        </div> -->
      </div>
    </div>

    <div class="frase-cel">
      <h1>Tú puedes</h1>
    </div>

    <div class="menu">
      <button
        type="button"
        class="circular inverted"
        aria-label="Expandir/Retraer el menú"
      >
        <i class="ti ti-plus xxl"></i>
      </button>
      <div class="gopt">
        <div class="xxx">
          <p class="rounded">Añadir tarea</p>
        </div>

        <div class="xxx">
          <p class="rounded">Añadir tablero</p>
        </div>
      </div>
    </div>
    <!--deprecate - 143:144-->
    <script src="js/toggleDropdown.js"></script>
    <script src="js/toggleNav.js"></script>
    <script src="js/gToday.js"></script>
    <script type="module" src="js/donut.js"></script>
    <script type="module" src="js/linearChart.js"></script>
  </body>
</html>
